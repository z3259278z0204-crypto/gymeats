<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 2500px; height: 1686px; }
  .grid {
    width: 2500px; height: 1686px;
    display: grid;
    grid-template-columns: 1250px 1250px;
    grid-template-rows: 562px 562px 562px;
    font-family: "PingFang TC", "Noto Sans TC", sans-serif;
  }
  .cell {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff; gap: 8px;
    border: 3px solid rgba(255,255,255,.22);
  }
  /* 圖示為主角，字很小很淡：用點的、不靠文字 */
  .icon  { font-size: 230px; line-height: 1; }
  .label { font-size: 58px; font-weight: 500; opacity: .82; letter-spacing: 4px; }
  .c1 { background:#1F7A5A; } .c2 { background:#2E8B6F; }
  .c3 { background:#3D9C84; } .c4 { background:#4CAD99; }
  .c5 { background:#5BBEAE; } .c6 { background:#6ACFC3; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell c1"><div class="icon">🍱</div><div class="label">記一餐</div></div>
    <div class="cell c2"><div class="icon">💰</div><div class="label">記帳</div></div>
    <div class="cell c3"><div class="icon">⚖️</div><div class="label">量體重</div></div>
    <div class="cell c4"><div class="icon">🏃</div><div class="label">記訓練</div></div>
    <div class="cell c5"><div class="icon">🧾</div><div class="label">查花費</div></div>
    <div class="cell c6"><div class="icon">📊</div><div class="label">總覽</div></div>
  </div>
</body>
</html>
