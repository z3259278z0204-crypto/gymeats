  <text class="icon"  x="625"  y="1219" text-anchor="middle">⚖️</text>
  <text class="label" x="625"  y="1349" text-anchor="middle">量體重</text>

  <text class="icon"  x="1875" y="1199" text-anchor="middle">📷</text>
  <text class="label" x="1875" y="1329" text-anchor="middle">拍照記</text>
