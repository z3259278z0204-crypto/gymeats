  <line x1="0"    y1="969"  x2="2500" y2="969"  stroke="#ffffff40" stroke-width="4"/>
  <line x1="0"    y1="1531" x2="2500" y2="1531" stroke="#ffffff40" stroke-width="4"/>

  <text class="icon"  x="625"  y="657"  text-anchor="middle">🍱</text>
